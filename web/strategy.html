<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Strategy Detail</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js" defer></script>
    <script src="app.js" defer></script>
  </head>
  <body data-page="strategy">
    <div class="page-shell">
      <header class="hero compact">
        <div class="hero-copy">
          <p class="eyebrow">Strategy Detail</p>
          <h1 id="strategy-title">Loading result...</h1>
          <p id="strategy-subtitle" class="hero-text">Fetching summary, curve, annual returns, and trade log.</p>
        </div>
        <nav class="top-nav">
          <a class="nav-link" href="index.html">Results</a>
          <a class="nav-link" href="compare.html">Compare</a>
        </nav>
      </header>

      <main class="content-stack">
        <section id="strategy-state" class="empty-state hidden"></section>

        <section class="metric-grid" id="strategy-metrics"></section>

        <section class="panel">
          <div class="panel-header">
            <div>
              <p class="section-label">Chart</p>
              <h2>Equity curve</h2>
            </div>
          </div>
          <div class="chart-card">
            <canvas id="strategy-chart"></canvas>
          </div>
        </section>

        <section class="panel">
          <div class="panel-header">
            <div>
              <p class="section-label">Yearly performance</p>
              <h2>Annual returns</h2>
            </div>
          </div>
          <div class="table-wrap">
            <table class="data-table">
              <thead>
                <tr>
                  <th>Year</th>
                  <th>Return</th>
                </tr>
              </thead>
              <tbody id="annual-returns-body"></tbody>
            </table>
          </div>
        </section>

        <section class="panel">
          <div class="panel-header">
            <div>
              <p class="section-label">Transactions</p>
              <h2>Trade log</h2>
            </div>
          </div>
          <div class="table-wrap">
            <table class="data-table trade-table">
              <thead>
                <tr>
                  <th>Date</th>
                  <th>Asset</th>
                  <th>Action</th>
                  <th>Shares</th>
                  <th>Price</th>
                  <th>Amount</th>
                  <th>Reason</th>
                </tr>
              </thead>
              <tbody id="trade-log-body"></tbody>
            </table>
          </div>
        </section>
      </main>
    </div>
  </body>
</html>
