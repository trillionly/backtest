<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>전략 상세 보기</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js" defer></script>
    <script src="app.js" defer></script>
  </head>
  <body data-page="strategy">
    <div class="page-shell">
      <header class="hero compact">
        <div class="hero-copy">
          <p class="eyebrow">전략 상세</p>
          <h1 id="strategy-title">결과를 불러오는 중...</h1>
          <p id="strategy-subtitle" class="hero-text">요약 지표, 자산곡선, 연도별 수익률, 매매 내역을 불러오고 있습니다.</p>
        </div>
        <nav class="top-nav">
          <a class="nav-link" href="index.html">결과 목록</a>
          <a class="nav-link" href="compare.html">비교</a>
        </nav>
      </header>

      <main class="content-stack">
        <section id="strategy-state" class="empty-state hidden"></section>

        <section class="metric-grid" id="strategy-metrics"></section>

        <section class="panel">
          <div class="panel-header">
            <div>
              <p class="section-label">차트</p>
              <h2>자산곡선</h2>
            </div>
          </div>
          <div class="chart-card">
            <canvas id="strategy-chart"></canvas>
          </div>
        </section>

        <section class="panel">
          <div class="panel-header">
            <div>
              <p class="section-label">연도별 성과</p>
              <h2>연도별 수익률</h2>
            </div>
          </div>
          <div class="table-wrap">
            <table class="data-table">
              <thead>
                <tr>
                  <th>연도</th>
                  <th>수익률</th>
                </tr>
              </thead>
              <tbody id="annual-returns-body"></tbody>
            </table>
          </div>
        </section>

        <section class="panel">
          <div class="panel-header">
            <div>
              <p class="section-label">거래 내역</p>
              <h2>매매 내역</h2>
            </div>
          </div>
          <div class="table-wrap">
            <table class="data-table trade-table">
              <thead>
                <tr>
                  <th>날짜</th>
                  <th>자산</th>
                  <th>구분</th>
                  <th>수량</th>
                  <th>가격</th>
                  <th>금액</th>
                  <th>사유</th>
                </tr>
              </thead>
              <tbody id="trade-log-body"></tbody>
            </table>
          </div>
        </section>
      </main>
    </div>
  </body>
</html>
