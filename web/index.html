<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Backtest Results</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js" defer></script>
    <script src="app.js" defer></script>
  </head>
  <body data-page="index">
    <div class="page-shell">
      <header class="hero">
        <div class="hero-copy">
          <p class="eyebrow">ETF Backtest Reporting</p>
          <h1>Saved strategy results, organized for quick review</h1>
          <p class="hero-text">
            Browse generated backtests, scan headline metrics, and open deeper detail or side-by-side comparison pages.
          </p>
        </div>
        <nav class="top-nav">
          <a class="nav-link active" href="index.html">Results</a>
          <a class="nav-link" href="compare.html">Compare</a>
        </nav>
      </header>

      <main class="content-stack">
        <section class="panel">
          <div class="panel-header">
            <div>
              <p class="section-label">Overview</p>
              <h2>Available backtest results</h2>
            </div>
            <p id="result-count" class="panel-meta">Loading results...</p>
          </div>
          <div id="index-state" class="empty-state hidden"></div>
          <div id="index-grid" class="result-grid"></div>
        </section>
      </main>
    </div>
  </body>
</html>
