<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>백테스트 결과 목록</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js" defer></script>
    <script src="app.js" defer></script>
  </head>
  <body data-page="index">
    <div class="page-shell">
      <header class="hero">
        <div class="hero-copy">
          <p class="eyebrow">ETF 백테스트 리포트</p>
          <h1>저장된 전략 결과를 빠르게 확인할 수 있도록 정리했습니다</h1>
          <p class="hero-text">
            생성된 백테스트 결과를 한눈에 살펴보고, 상세 화면과 비교 화면으로 바로 이동할 수 있습니다.
          </p>
        </div>
        <nav class="top-nav">
          <a class="nav-link active" href="index.html">결과 목록</a>
          <a class="nav-link" href="compare.html">비교</a>
        </nav>
      </header>

      <main class="content-stack">
        <section class="panel">
          <div class="panel-header">
            <div>
              <p class="section-label">개요</p>
              <h2>저장된 백테스트 결과</h2>
            </div>
            <p id="result-count" class="panel-meta">결과를 불러오는 중...</p>
          </div>
          <div class="control-stack">
            <div class="search-row">
              <label class="search-box" for="search-input">
                <span class="search-label">검색</span>
                <input id="search-input" type="search" placeholder="전략명, ID, 설명, 태그 검색" />
              </label>
              <label class="favorite-toggle" for="favorites-only">
                <input id="favorites-only" type="checkbox" />
                <span>즐겨찾기만 보기</span>
              </label>
            </div>
            <div class="toolbar-row">
              <div class="sort-box">
                <label for="sort-select">정렬</label>
                <select id="sort-select">
                  <option value="created_at_desc">최근 추가순</option>
                  <option value="name_asc">이름순</option>
                  <option value="total_return_desc">총수익률순</option>
                  <option value="cagr_desc">CAGR순</option>
                  <option value="mdd_desc">MDD순</option>
                </select>
              </div>
              <div id="tag-filters" class="tag-filter-row"></div>
              <button id="compare-selected-button" class="button-link" type="button" disabled>선택한 전략 비교</button>
            </div>
          </div>
          <div id="index-state" class="empty-state hidden"></div>
          <div id="index-grid" class="result-grid"></div>
        </section>
      </main>
    </div>
  </body>
</html>
