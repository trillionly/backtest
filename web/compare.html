<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>백테스트 비교</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js" defer></script>
    <script src="app.js" defer></script>
  </head>
  <body data-page="compare">
    <div class="page-shell">
      <header class="hero compact">
        <div class="hero-copy">
          <p class="eyebrow">결과 비교</p>
          <h1>여러 백테스트 결과를 나란히 비교합니다</h1>
          <p class="hero-text">두 개 이상의 결과 파일을 선택하면 요약 지표와 자산곡선을 함께 볼 수 있습니다.</p>
        </div>
        <nav class="top-nav">
          <a class="nav-link" href="index.html">결과 목록</a>
          <a class="nav-link active" href="compare.html">비교</a>
        </nav>
      </header>

      <main class="content-stack">
        <section class="panel">
          <div class="panel-header">
            <div>
              <p class="section-label">선택</p>
              <h2>비교할 결과 파일 선택</h2>
            </div>
          </div>
          <div id="compare-state" class="empty-state hidden"></div>
          <div id="compare-selector" class="selection-grid"></div>
        </section>

        <section class="panel">
          <div class="panel-header">
            <div>
              <p class="section-label">차트</p>
              <h2>비교 자산곡선</h2>
            </div>
          </div>
          <div class="chart-card">
            <canvas id="compare-chart"></canvas>
          </div>
        </section>

        <section class="panel">
          <div class="panel-header">
            <div>
              <p class="section-label">요약</p>
              <h2>비교 표</h2>
            </div>
          </div>
          <div class="table-wrap">
            <table class="data-table">
              <thead>
                <tr>
                  <th>전략명</th>
                  <th>전략 ID</th>
                  <th>최종 평가금액</th>
                  <th>총수익률</th>
                  <th>CAGR</th>
                  <th>MDD</th>
                  <th>기간</th>
                </tr>
              </thead>
              <tbody id="compare-summary-body"></tbody>
            </table>
          </div>
        </section>
      </main>
    </div>
  </body>
</html>
